[baseline]
id = "2026-06-24_local_macos_arm64"
captured_at = "2026-06-24"
git_commit = "working-tree"
machine = "local-macos-arm64"
os = "macOS arm64"
platform = "macOS-26.5.1-arm64-arm-64bit"
python = "3.12.11"
notes = '''
Machine-specific baseline captured after completing renderer performance epics
238-245. Canvas backend values use native interactive mode with the required
Rust gummy_canvas runtime rebuilt in release mode. Normal scenarios use the
240 FPS floor; explicitly named high-count stress scenarios use their documented
60 FPS stress target.
'''

[canvas_suite]
command = "uv run pytest tests/benchmark/test_canvas_backend_perf.py --run-benchmarks -q -s"
frames = 120
repeats = 2
required_min_fps = 240.0
stress_min_fps = 60.0
backend_mode = "interactive"
canvas_size = [720, 480]
pixel_density = 1.0
gpu_available = true
status = "passed"

