[baseline]
id = "2026-07-10_release_macos_arm64"
captured_at = "2026-07-10"
git_commit = "ba1a6033b0dd1bbc20df749e455b3eea708764f1"
machine = "local-macos-arm64"
platform = "macOS-26.5.1-arm64-arm-64bit"
python = "3.12.11"
canvas_build = "maturin develop --release"
comparison_scope = "same machine, operating system, interpreter, revision, and release-build fingerprint only"
notes = '''
Measured directly after a release Maturin build. Values are retained observations,
not portable CI timing claims. Interactive canvas scenarios use the required 240
FPS floor. Model export is governed by its 4 MiB streaming-memory budget. Offline
synth timing is reported only; repeated serialized-plan output is an exact-byte
functional contract.
'''

[canvas_suite]
benchmark_id = "canvas_backend_interactive_v1"
scenario_support = "tests/benchmark/canvas_backend_perf/"
comparison_tolerance = "same machine/build fingerprint; preserve the 240 FPS floor and documented scene margins"
command = "uv run pytest tests/benchmark/test_canvas_backend_perf.py tests/benchmark/test_webgl_3d_perf.py --run-benchmarks -q -s"
backend_mode = "interactive"
frames = 120
repeats = 2
required_min_fps = 240.0
gpu_available = true
status = "passed"

[[canvas_suite.results]]
variant = "dense_primitives"
mean_fps = 325.83
min_fps = 302.16
max_fps = 349.49
meets_required_min_fps = true

[[canvas_suite.results]]
variant = "cached_images"
mean_fps = 328.01
min_fps = 315.89
max_fps = 340.12
meets_required_min_fps = true

[[canvas_suite.results]]
variant = "transformed_images"
mean_fps = 301.29
min_fps = 259.47
max_fps = 343.12
meets_required_min_fps = true

[[canvas_suite.results]]
variant = "mixed_text_pixels"
mean_fps = 251.40
min_fps = 242.36
max_fps = 260.43
meets_required_min_fps = true

[[canvas_suite.results]]
variant = "webgl_3d"
mean_fps = 910.88
min_fps = 903.10
max_fps = 918.67
meets_required_min_fps = true

[model_export]
command = "uv run pytest tests/benchmark/test_model_export_perf.py --run-benchmarks -q -s"
streaming_memory_budget_mib = 4.0
obj_torus_peak_mib = 0.00
stl_sphere_peak_mib = 0.00
status = "passed"

[ecs_spatial]
command = "uv run pytest tests/benchmark/test_ecs_perf.py tests/benchmark/test_ecs_spatial_perf.py --run-benchmarks -q -s"
status = "passed"
required_hot_path_diagnostics = ["ecs_physical_system_runs > 0", "ecs_udf_calls == 0", "no physical-plan or execution errors"]

[ecs_ants_2d]
benchmark_id = "ecs_ants_2d_voxel_colony_v1"
command = "uv run pytest tests/benchmark/test_ecs_ants_2d_perf.py --run-benchmarks -q -s"
build_mode = "maturin develop --release"
backend_mode = "ecs-world"
frames = 120
warmup_frames = 20
repeats = 1
metrics = ["counts", "ecs_physical_system_runs", "ecs_udf_calls", "compiled_plan_count"]
comparison_tolerance = "same machine/build fingerprint; preserve 10,000 ants, zero UDF calls, and the 100 FPS gate"
status = "path_metadata_only"

[ecs_scenarios]
benchmark_id = "ecs_performance_scenarios_v1"
command = "uv run pytest tests/benchmark/test_ecs_scenarios_perf.py --run-benchmarks -q -s"
build_mode = "maturin develop --release"
backend_mode = "headless"
frames = 120
repeats = 1
scenario_ids = ["rust_2d_primitives_branching", "python_systems_udfs_sprites", "structural_churn_tags_components", "spatial_events_for_each_stress", "webgl_3d_ecs_primitives_models"]
metrics = ["fps", "renderer", "ecs", "python", "platform", "backend_mode"]
comparison_tolerance = "same machine/build fingerprint; preserve each payload schema and the 120 FPS gate"
status = "path_metadata_only"

[synth_offline]
command = "uv run pytest tests/benchmark/test_synth_offline_perf.py --run-benchmarks -q -s"
sample_rate_hz = 44100
duration_seconds = 0.25
serialized_plan_bytes = 315
wav_bytes = 44144
pcm_frames = 11025
channels = 2
sample_width_bytes = 2
non_silent_bytes = 23339
repeat_byte_equal = true
median_render_ms = 4.396
status = "passed"
