[baseline]
id = "2026-06-22_local_macos_arm64"
captured_at = "2026-06-22"
git_commit = "b87d239"
machine = "local-macos-arm64"
os = "Darwin 25.5.0 arm64"
platform = "macOS-26.5.1-arm64-arm-64bit"
python = "3.12.11"
python_executable = "/Users/jhenson/zed_projects/gummy_snake/.venv/bin/python"
notes = '''
Machine-specific baseline captured from the local development machine after
raising canvas and WEBGL frame-style benchmarks to the 240 FPS target. Use these
numbers only for comparison against subsequent runs on the same
machine/configuration, not as portable thresholds for CI or other hardware.
Below-target measured values are recorded here to make optimization gaps
explicit.
'''

[canvas_suite]
command = "uv run pytest tests/benchmark/test_canvas_backend_perf.py --run-benchmarks -q -s"
frames = 120
repeats = 2
required_min_fps = 240.0
backend_mode = "headless"
canvas_size = [720, 480]
pixel_density = 1.0
gpu_available = "unknown"

