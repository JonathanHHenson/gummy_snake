[my_pbi]
title = "Implement p5_canvas core 2D rendering parity"
description = '''
As a sketch author,
I want the Rust canvas backend to render p5-py 2D primitives consistently with the existing renderers,
So that ordinary sketches can move to the new backend without visual or API regressions.
'''
acceptance_criteria = '''
`CanvasRenderer` delegates 2D rendering to Rust for frame lifecycle, background, clear, point, line, polygon, ellipse, arc, transformed geometry, fill/stroke state, stroke weight, and the core logical-to-physical pixel-density mapping. Headless parity tests compare deterministic output against the existing Pillow renderer within documented tolerances. Capability flags advertise only implemented behavior.
'''
priotity = 'high'
status = 'TODO'

[my_pbi.task_1]
order = 1
status = 'TODO'
description = '''
Choose and document the Rust rendering stack for 2D primitives and offscreen surfaces, including tradeoffs for GPU rendering, deterministic readback, cross-platform support, and future WEBGL/3D compatibility.
'''

[my_pbi.task_2]
order = 2
status = 'TODO'
description = '''
Implement Rust canvas sizing with logical width/height, physical width/height, pixel density validation, and top-left p5 coordinate semantics at the Python boundary.
'''

