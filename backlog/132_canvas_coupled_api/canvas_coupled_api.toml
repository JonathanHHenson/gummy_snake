[my_pbi]
title = "Tighten the p5 API around the canvas backend"
description = '''
As a maintainer,
I want the public p5 runtime to be intentionally canvas-first after old backends are deleted,
So that API behavior, capability checks, and error messages no longer preserve unused backend abstraction layers.
'''
acceptance_criteria = '''
After Pyglet and Pillow removal, the project has an explicit architecture decision to make canvas the required runtime. Public API calls can depend directly on canvas capabilities where appropriate, backend registry/custom-backend abstractions are removed or reduced by deliberate design, docs explain the new architecture, and tests cover startup, missing native support, offscreen mode, and package import behavior.
'''
priotity = 'low'
status = 'TODO'

