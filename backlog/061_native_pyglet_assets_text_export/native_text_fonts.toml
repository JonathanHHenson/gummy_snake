`PygletRenderer.text`, `text_width`, `text_ascent`, and `text_descent` support the existing p5-py text state for common use cases, including font size, loaded fonts where practical, alignment, leading, multiline text, fill color, transforms, and HiDPI mapping. Unsupported style combinations raise clear capability errors or are documented as partial.
'''
