[my_pbi]
title = "Delete the Pillow backend and renderer dependencies"
description = '''
As a maintainer,
I want to remove the Pillow-backed renderer and backend alias once canvas has deterministic offscreen parity,
So that rendering, readback, export, images, and text are owned by the canvas stack.
'''
acceptance_criteria = '''
The `pillow` backend alias, `PillowRenderer`, Pillow-only rendering paths, Pillow text bridge, and Pillow dependency are removed only after canvas provides deterministic offscreen/headless rendering, native text, image decoding or replacement image handling, pixels/compositing, golden-test strategy, and export parity. Former `backend="headless"` workflows either run through canvas offscreen mode or are replaced by a documented canvas test/export mode.
'''
