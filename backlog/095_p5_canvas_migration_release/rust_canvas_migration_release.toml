[my_pbi]
title = "Migrate p5-py to the p5_canvas backend safely"
description = '''
As a maintainer,
I want a measured migration from Pillow/Pyglet to the Rust canvas backend,
So that the new backend can become the default without breaking existing sketches, tests, examples, or packaging.
'''
acceptance_criteria = '''
The `canvas` backend is validated across supported platforms and examples, documentation explains how to use and build it, CI covers Rust and Python behavior, and the default backend only changes after documented parity criteria are met. Existing `headless`, `pillow`, and `pyglet` backends remain available or are deprecated through an explicit release plan.
'''
priotity = 'medium'
status = 'TODO'

