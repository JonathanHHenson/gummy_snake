[my_pbi]
title = "Replace the canvas Pillow text bridge with native Rust text"
description = '''
As a maintainer,
I want canvas text rendering and metrics to run through a native Rust text stack,
So that the canvas backend can delete its Pillow glyph-raster dependency before Pillow backend removal.
'''
acceptance_criteria = '''
`text`, `text_width`, `text_ascent`, `text_descent`, font loading, alignment, leading, clipping, transforms, HiDPI rendering, readback, and export work through the Rust canvas text path without using the Pillow glyph bridge. Text parity tests and examples pass, and the old bridge is removed or retained only behind a documented fallback flag.
'''
priotity = 'medium'
status = 'DONE'

[my_pbi.task_1]
order = 1
status = 'DONE'
description = '''
Choose and document the Rust font loading, shaping, glyph atlas, fallback font, and text metrics approach for the canvas backend.
'''

[my_pbi.task_2]
order = 2
status = 'DONE'
description = '''
Implement glyph rasterization or atlas upload, text layout, alignment, leading, clipping, transforms, and HiDPI-aware drawing in the Rust canvas renderer.
'''

[my_pbi.task_3]
order = 3
status = 'DONE'
description = '''
Replace Python-side Pillow text overlays in `CanvasRenderer` while preserving public API return types and error behavior.
'''

[my_pbi.task_4]
order = 4
status = 'DONE'
description = '''
Add parity tests, font-loading tests, metrics tests, export/readback tests, and examples covering default and loaded fonts.
'''
