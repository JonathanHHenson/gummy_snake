[my_pbi]
title = "Implement p5_canvas images, text, pixels, compositing, and export"
description = '''
As a sketch author using assets and pixel APIs,
I want the Rust canvas backend to match existing Pillow/Pyglet behavior for images, text, pixels, blending, erase, and save operations,
So that the new backend can replace both interactive and headless modes for real sketches.
'''
acceptance_criteria = '''
The Rust canvas backend supports image drawing with cropping/scaling/transforms, text rendering and metrics, `load_pixels`, `update_pixels`, `blend_region`, all advertised blend modes, `erase`/`no_erase`, and `save_canvas` export with top-left physical RGBA semantics. Tests compare deterministic behavior against Pillow where practical and document any accepted text/font tolerances.
'''
priotity = 'high'
status = 'TODO'

[my_pbi.task_1]
order = 1
status = 'TODO'
description = '''
Design and implement the Python-to-Rust image bridge, including RGBA upload, dimensions, image identity/version caching, source-rectangle cropping, sampling modes, alpha compositing, and transformed destination rectangles.
'''

[my_pbi.task_2]
order = 2
status = 'TODO'
description = '''
Choose and implement the Rust text stack for font loading, text rendering, `text_width`, `text_ascent`, and `text_descent`, documenting platform/font differences from Pillow and Pyglet.
'''

[my_pbi.task_3]
order = 3
status = 'TODO'
description = '''
Implement `load_pixels` and `update_pixels` using top-left-oriented physical RGBA buffers, exact buffer length validation, and correct behavior after subsequent native drawing.
'''

[my_pbi.task_4]
order = 4
status = 'TODO'
description = '''
Implement `blend_region` for canvas and image sources, including source cropping, destination scaling, clipping, HiDPI physical-pixel handling, and p5 top-left coordinate semantics.
'''

[my_pbi.task_5]
order = 5
status = 'TODO'
description = '''
Implement blend modes `BLEND`, `REPLACE`, `ADD`, `DARKEST`, `LIGHTEST`, `DIFFERENCE`, `EXCLUSION`, `MULTIPLY`, and `SCREEN`, plus `erase`/`no_erase` alpha behavior, with parity tests against the Pillow reference.
'''

[my_pbi.task_6]
order = 6
status = 'TODO'
description = '''
Implement `save_canvas`/renderer `save` export from Rust surfaces, preserving physical HiDPI output dimensions, RGBA channel order, and deterministic file output for headless tests.
'''

[my_pbi.task_7]
