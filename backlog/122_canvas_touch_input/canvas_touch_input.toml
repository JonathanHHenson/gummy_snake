[my_pbi]
title = "Add touch input support to the canvas backend"
description = '''
As a sketch author targeting touch-capable devices,
I want the canvas backend to normalize touch events,
So that touch callbacks and state work without the Pyglet backend.
'''
acceptance_criteria = '''
The Rust canvas runtime reports touch start/move/end/cancel events where supported by the platform. Python normalizes those events into existing `TouchPoint` and touch callback state, documents unsupported environments, and advertises `touch=True` only after synthetic and platform smoke tests pass.
'''
priotity = 'medium'
status = 'DONE'

[my_pbi.task_1]
order = 1
status = 'DONE'
description = '''
Define the Rust event payload schema for touch identifiers, logical coordinates, pressure when available, phase, timestamp, and device/platform metadata.
'''

[my_pbi.task_2]
order = 2
status = 'DONE'
description = '''
Implement touch event collection in the native canvas runtime and queue normalized events through the existing Python polling bridge.
'''

[my_pbi.task_3]
order = 3
status = 'DONE'
description = '''
Update Python event dispatch and input state integration so touch callbacks, `touches`, and lifecycle ordering match existing public API expectations.
'''

[my_pbi.task_4]
order = 4
status = 'DONE'
description = '''
Add synthetic unit tests, platform notes, manual smoke-test instructions, and capability gating for environments without touch support.
'''
