name: Record governed Canvas benchmark

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Self-hosted qualified benchmark-runner label
        required: true
        default: benchmark-macos-arm64
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: benchmark-record-${{ inputs.runner_label }}
  cancel-in-progress: false

jobs:
  record:
    name: Record Canvas benchmark on ${{ inputs.runner_label }}
    runs-on: [self-hosted, "${{ inputs.runner_label }}"]
    timeout-minutes: 180
    steps:
      - name: Check out the measured source commit
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install development tools
        run: uv sync --dev

      - name: Build the release Canvas runtime
        run: make runtime-develop-release

      - name: Run the governed recorder
        id: record
        env:
          PYTHONHASHSEED: "270005"
        run: |
          set -eu
          uv run python scripts/benchmark.py --repo . --remote origin record-head benchmarks/canvas_v1.toml
          branch="$(git for-each-ref --format='%(refname:short)' --sort=-creatordate --count=1 refs/heads/benchmark-record)"
          test -n "$branch"
          commit="$(git rev-parse "refs/heads/$branch")"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Push immutable candidate branch
        env:
          BRANCH: ${{ steps.record.outputs.branch }}
        run: git push origin "refs/heads/$BRANCH:refs/heads/$BRANCH"

      - name: Open a protected data-record pull request
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.record.outputs.branch }}
          COMMIT: ${{ steps.record.outputs.commit }}
        run: |
          gh pr create \
            --base benchmark-data-v1 \
            --head "$BRANCH" \
            --title "benchmark: Canvas record $COMMIT" \
            --body "Automated immutable Canvas benchmark record staged by the governed recorder. Review the source commit, exact runner fingerprint, correctness results, raw samples, and comparison decision before merging."
