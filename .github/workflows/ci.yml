name: CI

on:
  push:
  pull_request:

env:
  # CI runners do not expose a hardware GPU consistently. Keep rendering on the
  # GPU API path by using Mesa's Vulkan/lavapipe adapter instead of falling back
  # to CPU rasterization in Gummy Snake.
  WGPU_BACKEND: vulkan

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libxtst-dev \
            mesa-vulkan-drivers \
            pkg-config
      - run: uv sync --dev --no-install-project
      - run: uvx maturin develop --release --manifest-path crates/gummy_canvas/Cargo.toml --features extension-module
      - run: cargo test --manifest-path crates/gummy_ecs/Cargo.toml
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run python scripts/bump_version.py --check
      - run: uv run pytest
      - run: uv run python examples/01_getting_started/basic_shapes.py --headless --frames 1

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libxtst-dev \
            mesa-vulkan-drivers \
            pkg-config
      - run: uv sync --dev --no-install-project
      - run: uvx maturin develop --release --manifest-path crates/gummy_canvas/Cargo.toml --features extension-module
      - run: uv run pytest --cov=gummysnake --cov-report=term-missing --cov-report=xml
      - name: Add coverage summary
        run: |
          {
            echo "## Coverage"
            echo
            uv run coverage report --format=markdown
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libxtst-dev \
            mesa-vulkan-drivers \
            pkg-config
      - run: uv build
      - name: Verify sdist includes Rust ECS crate
        run: |
          python - <<'PY'
          import tarfile
          from pathlib import Path

          sdist = next(Path("dist").glob("gummy_snake-*.tar.gz"))
          with tarfile.open(sdist) as archive:
              names = set(archive.getnames())
          required_suffixes = [
              "crates/gummy_ecs/Cargo.toml",
              "crates/gummy_ecs/src/lib.rs",
              "crates/gummy_ecs/src/world.rs",
              "crates/gummy_ecs/src/execution.rs",
              "crates/gummy_ecs/src/spatial.rs",
          ]
          missing = [
              suffix for suffix in required_suffixes if not any(name.endswith(suffix) for name in names)
          ]
          if missing:
              raise SystemExit(f"sdist {sdist} is missing ECS crate files: {missing}")
          print(f"{sdist} contains the Rust ECS crate.")
          PY

  build-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libxtst-dev \
            mesa-vulkan-drivers \
            pkg-config
      - run: uv sync --dev --no-install-project
      - run: uvx maturin build --release --manifest-path crates/gummy_accel/Cargo.toml --features extension-module
      - run: cargo test --manifest-path crates/gummy_ecs/Cargo.toml
      - run: cargo test --manifest-path crates/gummy_canvas/Cargo.toml
      - run: uvx maturin build --release --manifest-path crates/gummy_canvas/Cargo.toml --features extension-module

  canvas-runtime-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libxtst-dev \
            mesa-vulkan-drivers \
            pkg-config
      - run: uv sync --dev --no-install-project
      - run: uvx maturin develop --release --manifest-path crates/gummy_canvas/Cargo.toml --features extension-module
      - run: uv run pytest tests/unit/test_rust_canvas.py tests/contracts/test_canvas_backend.py
