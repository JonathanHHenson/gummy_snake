name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  # GitHub runners do not expose a hardware GPU consistently. Mesa's Vulkan
  # adapter keeps canvas tests on the supported GPU API path without a Python
  # renderer fallback.
  WGPU_BACKEND: vulkan

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-linux
      - run: uv sync --dev --no-install-project
      - run: make runtime-develop-release
      - run: make format-check
      - run: make static-analysis
      - run: make repository-audits
      - run: make version-check
      - run: make assets-check
      # The focused route is intentionally separate from the full-suite gate:
      # source-to-test impact-map owners retain a fast PR signal.
      - run: make test-focused
      - run: make test-full
      - run: make smoke-release

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-linux
      # `.cargo/config.toml` deliberately binds PyO3 to this managed interpreter.
      - run: uv sync --dev --no-install-project
      - run: make rust-check

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-linux
      - run: uv sync --dev --no-install-project
      - run: make package-verify

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-linux
      - run: uv sync --dev --no-install-project
      - run: make runtime-develop-release
      - run: uv run pytest --cov=gummysnake --cov-report=term-missing --cov-report=xml
      - name: Add coverage summary
        run: |
          {
            echo "## Coverage"
            echo
            uv run coverage report --format=markdown
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
