name: Publish

on:
  workflow_dispatch:
    inputs:
      repository:
        description: Package index to publish to
        required: true
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi
  push:
    tags:
      - "v*"

permissions: {}

env:
  # Publish validation runs headless rendering on Linux CI runners without a
  # hardware GPU. Use Mesa's Vulkan/lavapipe adapter so tests stay on the GPU API
  # path instead of requiring Gummy Snake CPU raster fallbacks.
  WGPU_BACKEND: vulkan

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libxtst-dev \
            mesa-vulkan-drivers \
            pkg-config

      - name: Install dev dependencies
        run: uv sync --dev --no-install-project

      - name: Install canvas runtime
        run: uvx maturin develop --release --manifest-path crates/gummy_canvas/Cargo.toml --features extension-module

      - name: Test Rust ECS crate
        run: cargo test --manifest-path crates/gummy_ecs/Cargo.toml

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src

      - name: Check version sync
        run: uv run python scripts/bump_version.py --check

      - name: Run tests
        run: uv run pytest

      - name: Smoke test headless example
        run: uv run python examples/01_getting_started/basic_shapes.py --headless --frames 1

      - name: Smoke test ECS example
        run: uv run python examples/10_ecs/firefly_constellation.py --headless --frames 1 --no-save

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - uses: dtolnay/rust-toolchain@stable

      - name: Build sdist
        run: uv build --sdist

      - name: Verify sdist includes Rust ECS crate
        run: |
          python - <<'PY'
          import tarfile
          from pathlib import Path

          sdist = next(Path("dist").glob("gummy_snake-*.tar.gz"))
          with tarfile.open(sdist) as archive:
              names = set(archive.getnames())
          required_suffixes = [
              "crates/gummy_ecs/Cargo.toml",
              "crates/gummy_ecs/src/lib.rs",
              "crates/gummy_ecs/src/world.rs",
              "crates/gummy_ecs/src/execution.rs",
              "crates/gummy_ecs/src/spatial.rs",
          ]
          missing = [
              suffix for suffix in required_suffixes if not any(name.endswith(suffix) for name in names)
          ]
          if missing:
              raise SystemExit(f"sdist {sdist} is missing ECS crate files: {missing}")
          print(f"{sdist} contains the Rust ECS crate.")
          PY

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build ${{ matrix.label }} wheel
    runs-on: ${{ matrix.os }}
    needs: validate
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64
            maturin-args: --release --out dist --features extension-module --interpreter /opt/python/cp312-cp312/bin/python
          - label: macos-x86_64
            os: macos-26-intel
            target: x86_64-apple-darwin
            maturin-args: --release --out dist --features extension-module
          - label: macos-arm64
            os: macos-26
            target: aarch64-apple-darwin
            maturin-args: --release --out dist --features extension-module
          - label: windows-x64
            os: windows-latest
            target: x64
            maturin-args: --release --out dist --features extension-module
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Build canvas runtime wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: ${{ matrix.maturin-args }}
          manylinux: auto
          before-script-linux: |
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y pkgconf-pkg-config alsa-lib-devel libX11-devel libXcursor-devel libXext-devel libXfixes-devel libXi-devel libXrandr-devel libXrender-devel libXScrnSaver-devel libXtst-devel libxcb-devel libxkbcommon-devel wayland-devel
            else
              yum install -y pkgconfig alsa-lib-devel libX11-devel libXcursor-devel libXext-devel libXfixes-devel libXi-devel libXrandr-devel libXrender-devel libXScrnSaver-devel libXtst-devel libxcb-devel libxkbcommon-devel wayland-devel
            fi

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ matrix.label }}
          path: dist/*.whl

  check-dist:
    name: Verify distributions
    runs-on: ubuntu-latest
    needs:
      - build-sdist
      - build-wheels
    permissions:
      contents: read
    steps:
      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          path: dist/
          merge-multiple: true

      - name: Verify distribution metadata
        run: uv tool run twine check dist/*

      - name: Verify sdist includes Rust ECS crate
        run: |
          python - <<'PY'
          import tarfile
          from pathlib import Path

          sdist = next(Path("dist").glob("gummy_snake-*.tar.gz"))
          with tarfile.open(sdist) as archive:
              names = set(archive.getnames())
          required_suffixes = [
              "crates/gummy_ecs/Cargo.toml",
              "crates/gummy_ecs/src/lib.rs",
              "crates/gummy_ecs/src/world.rs",
              "crates/gummy_ecs/src/execution.rs",
              "crates/gummy_ecs/src/spatial.rs",
          ]
          missing = [
              suffix for suffix in required_suffixes if not any(name.endswith(suffix) for name in names)
          ]
          if missing:
              raise SystemExit(f"sdist {sdist} is missing ECS crate files: {missing}")
          print(f"{sdist} contains the Rust ECS crate.")
          PY

      - name: Verify Linux wheel exposes ECS bridge
        run: |
          python -m venv .venv-wheel-check
          . .venv-wheel-check/bin/activate
          python -m pip install --upgrade pip
          python - <<'PY'
          from pathlib import Path

          wheels = sorted(Path("dist").glob("gummy_snake-*-manylinux*_x86_64.whl"))
          if not wheels:
              wheels = sorted(Path("dist").glob("gummy_snake-*-linux_x86_64.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one Linux x86_64 wheel, found: {wheels}")
          Path(".wheel-to-install").write_text(str(wheels[0]), encoding="utf-8")
          print(f"Selected {wheels[0]}")
          PY
          python -m pip install "$(cat .wheel-to-install)"
          python - <<'PY'
          from gummysnake.rust.ecs import (
              EXPECTED_ECS_ABI_VERSION,
              create_ecs_world,
              ecs_abi_version,
              require_ecs_runtime,
          )

          runtime = require_ecs_runtime()
          world = create_ecs_world()
          if ecs_abi_version() != EXPECTED_ECS_ABI_VERSION:
              raise SystemExit("Installed wheel exposes an incompatible ECS ABI.")
          if not hasattr(runtime, "EcsSpatialIndexRegistry"):
              raise SystemExit("Installed wheel is missing the ECS spatial index bridge.")
          if world.alive_count() != 0:
              raise SystemExit("Fresh ECS world from installed wheel should be empty.")
          print(f"Installed wheel exposes ECS ABI {ecs_abi_version()} and Rust EcsWorld.")
          PY

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi'
    needs: check-dist
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/gummy-snake
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          path: dist/
          merge-multiple: true

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi')
    needs: check-dist
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gummy-snake
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          path: dist/
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
