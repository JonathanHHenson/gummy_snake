name: Publish

on:
  workflow_dispatch:
    inputs:
      repository:
        description: Package index to publish to
        required: true
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi
  push:
    tags:
      - "v*"

permissions: {}

env:
  # Publish validation uses Mesa's Vulkan adapter on Linux rather than a Python
  # renderer fallback. Native wheel smoke always runs on its wheel's own OS.
  WGPU_BACKEND: vulkan

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-linux
      - run: uv sync --dev --no-install-project
      - run: make runtime-develop-release
      - run: make format-check
      - run: make static-analysis
      - run: make repository-audits
      - run: make version-check
      - run: make assets-check
      - run: make test-focused
      - run: make test-full
      - run: make smoke-release
      - run: make rust-check

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-linux
      - run: uv build --sdist --out-dir dist
      - name: Verify source-distribution contract
        run: make verify-sdist SDIST_DIR=dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build and smoke ${{ matrix.label }} wheel
    runs-on: ${{ matrix.os }}
    needs: validate
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64
            maturin-args: --release --out dist --features extension-module --interpreter /opt/python/cp312-cp312/bin/python
          - label: macos-x86_64
            os: macos-26-intel
            target: x86_64-apple-darwin
            maturin-args: --release --out dist --features extension-module
          - label: macos-arm64
            os: macos-26
            target: aarch64-apple-darwin
            maturin-args: --release --out dist --features extension-module
          - label: windows-x64
            os: windows-latest
            target: x64
            maturin-args: --release --out dist --features extension-module
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Pin macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=26.0" >> "$GITHUB_ENV"
      - name: Build canvas runtime wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: ${{ matrix.maturin-args }}
          manylinux: auto
          # This command executes inside maturin's manylinux container; the
          # host composite action cannot provision that separate environment.
          before-script-linux: |
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y pkgconf-pkg-config alsa-lib-devel libX11-devel libXcursor-devel libXext-devel libXfixes-devel libXi-devel libXrandr-devel libXrender-devel libXScrnSaver-devel libXtst-devel libxcb-devel libxkbcommon-devel wayland-devel
            else
              yum install -y pkgconfig alsa-lib-devel libX11-devel libXcursor-devel libXext-devel libXfixes-devel libXi-devel libXrandr-devel libXrender-devel libXScrnSaver-devel libXtst-devel libxcb-devel libxkbcommon-devel wayland-devel
            fi
      - name: Smoke installed native wheel
        run: uv run python scripts/verify_distribution.py --wheel-dir dist
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ matrix.label }}
          path: dist/*.whl

  check-dist:
    name: Verify distributions
    runs-on: ubuntu-latest
    needs:
      - build-sdist
      - build-wheels
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          path: dist/
          merge-multiple: true
      - name: Verify distribution metadata
        run: uv tool run twine check dist/*
      - name: Verify source-distribution contract
        run: uv run python scripts/verify_distribution.py --sdist-dir dist

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi'
    needs: check-dist
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/gummy-snake
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          path: dist/
          merge-multiple: true
      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi')
    needs: check-dist
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gummy-snake
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          path: dist/
          merge-multiple: true
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
