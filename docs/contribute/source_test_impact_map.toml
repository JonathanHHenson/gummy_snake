# Machine-readable companion to source_test_impact_map.md.
# Each source owner must declare every category. A category is either one or more
# named checks below or `N/A: <short rationale>`.

[map]
schema_version = 1
categories = ["unit", "contract", "integration", "golden", "benchmark", "stress", "example", "documentation", "packaging"]

[coverage_baseline]
captured_at = "2026-07-10"
command = "uv run pytest --cov=gummysnake --cov-report=term-missing --cov-report=xml"
passed = 412
skipped = 56
coverage_percent = 77
report = "coverage.xml"
review_policy = "Treat a material package-level decrease as a review item. Do not exclude meaningful behavior or weaken tests merely to raise coverage."

# `focus` says whether a group protects stable user-visible behavior or a local
# implementation invariant. `paths` are independently checked so a renamed test,
# example, document, manifest, or script cannot leave a live map entry behind.
[checks.public_api]
focus = "behavior"
paths = ["tests/unit/test_public_api_contract.py", "tests/unit/test_public_api_exports.py", "tests/unit/test_public_facade_contract.py"]
