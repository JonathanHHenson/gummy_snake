# Static, self-contained Canvas benchmark catalog.  Paths are relative to this file.
schema_version = 1

[suite]
id = "canvas"
version = 1

[[workloads]]
id = "lifecycle-hidpi"
version = 1
case_id = "headless-matrix"
execution_class = "headless"
capabilities = ["canvas-runtime", "offscreen-rendering", "pixel-readback"]
correctness = "hidpi-frame-count-and-pixels"
sampling_profile = "canvas-bounded-v1"
source_files = [
  "suites/__init__.py",
  "suites/canvas/__init__.py",
  "suites/canvas/fixtures.py",
  "suites/canvas/diagnostics.py",
  "suites/canvas/oracles.py",
  "suites/canvas/workloads.py",
]
[workloads.parameters]
frames = 1
width = 64
height = 48
density = "1.0"
frame_rate = 60
dispatch_route = "global"
frame_count_matrix = [1, 60, 600, 10000]
frame_rate_matrix = [30, 60, 120, 1000]
logical_size_matrix = ["640x480", "1280x720", "1920x1080", "3840x2160"]
density_matrix = ["1.0", "1.5", "2.0", "native"]
lifecycle_matrix = ["empty", "clear-only", "loop", "no-loop", "redraw", "idle", "resize"]
[workloads.primary_metric]
id = "frame-elapsed-ns"
version = 1
unit = "ns"
work_unit = "frame"
direction = "lower-is-better"
transform = "ratio"
zero_policy = "positive-baseline"
precision = 3

