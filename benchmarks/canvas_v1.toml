# Static, self-contained Canvas benchmark catalog. Paths are relative to this file.
schema_version = 1

[suite]
id = "canvas"
# Version 2 materializes new lifecycle, primitive/path, and feature case identities.
version = 3

[[workloads]]
id = "lifecycle-hidpi"
version = 1
case_id = "headless-continuous-clear-loop"
execution_class = "headless"
capabilities = ["canvas-runtime", "offscreen-rendering", "pixel-readback"]
correctness = "continuous-clear-loop-exact-callback-and-frame-count"
sampling_profile = "canvas-bounded-v1"
source_files = ["suites/__init__.py", "suites/canvas/__init__.py", "suites/canvas/fixtures.py", "suites/canvas/diagnostics.py", "suites/canvas/oracles.py", "suites/canvas/workloads.py"]
[workloads.parameters]
frames = 120
expected_draw_callbacks = 120
lifecycle_mode = "continuous-clear-loop"
width = 64
height = 48
density = "1.0"
frame_rate = 60
dispatch_route = "global"
[workloads.primary_metric]
id = "frame-elapsed-ns"
version = 1
unit = "ns"
work_unit = "frame"
direction = "lower-is-better"
transform = "ratio"
zero_policy = "positive-baseline"
precision = 3

[[workloads]]
id = "lifecycle-hidpi"
version = 1
case_id = "native-interactive-continuous-clear-loop"
execution_class = "native-interactive"
capabilities = ["canvas-runtime", "native-window"]
