# Static replacement Synth benchmark catalog. No legacy scenario is imported.
schema_version = 1

[suite]
id = "synth"
version = 1

[[workloads]]
id = "composition"
version = 1
case_id = "flat-events-1k"
execution_class = "headless"
capabilities = ["synth-runtime", "python-composition"]
correctness = "normalized-plan-digest-and-exact-event-order-without-audio-render"
sampling_profile = "micro"
source_files = ["suites/synth/__init__.py", "suites/synth/diagnostics.py", "suites/synth/fixtures.py", "suites/synth/oracles.py", "suites/synth/workloads.py"]
