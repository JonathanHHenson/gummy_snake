case_kind = "flat-events"
event_count = 1024
depth = 1
work_units = 1024
required_counters = []
[workloads.primary_metric]
id = "composition-elapsed-ns"
version = 1
unit = "ns"
work_unit = "event-declaration"
direction = "lower-is-better"
transform = "ratio"
zero_policy = "positive-baseline"
precision = 3

